<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPE-808</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            max-width: 1400px;
            width: 95vw;
            margin: 0 auto 0 2rem; /* Scoot to the left! */
        }
        @media (min-width: 1000px) {
            #app {
                flex-direction: row;
                align-items: start;
                justify-content: center;
                gap: 3rem;
                padding: 2rem;
            }
        }
        header {
            text-align: center;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            line-height: 1;
        }
        .subtitle {
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }
        #pads {
            display: grid;
            grid-template-columns: repeat(4, 180px);
            grid-template-rows: repeat(3, 180px);
            gap: 10px;
            width: 750px; /* 4 * 180 + 3 * 10px gaps */
            height: 560px; /* 3 * 180 + 2 * 10px gaps */
            margin: 0 auto;
        }
        .pad {
            position: relative;
            cursor: pointer;
            height: 180px;
        }
        .pad-text {
            position: absolute;
            font-size: 11px;
            font-family: 'Rubik', sans-serif;
            text-align: left;
            word-break: break-all;
            width: 180px;
            height: 180px;
            opacity: 0.8;
            pointer-events: none;
            box-sizing: border-box;
            padding: 2px;
            text-transform: uppercase;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .pad-text span {
            display: inline-block;
            width: 12px;
            height: 12px;
            text-align: center;
            line-height: 12px;
        }
        #sequencer {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .seq-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: pre;
            justify-content: center;
        }
        .label {
            width: 100px;
            font-size: 1rem;
            opacity: 1.0;
            text-transform: uppercase;
            font-family: 'Rubik', sans-serif;
        }
        .steps {
            display: flex;
            gap: 0.2rem;
            letter-spacing: 0.1em;
        }
        .step {
            cursor: pointer;
            transition: opacity 0.1s;
        }
        .step:hover {
            opacity: 0.7;
        }
        .step.active {
            color: #fff;
        }
        .step.inactive {
            color: rgba(255, 255, 255, 0.3);
        }
        .step.bar-start {
            color: rgba(255, 255, 255, 0.6);
        }
        .separator {
            color: rgba(255, 255, 255, 0.2);
            margin: 0 0.2rem;
        }
        #controls {
            display: flex;
            gap: 2rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-top: 2rem;
        }
        .control-btn {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: inherit;
            text-transform: inherit;
            letter-spacing: inherit;
        }
        .control-btn:hover {
            opacity: 1;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="app">


        <div id="pads">
            <!-- Pads will be generated by JS -->
        </div>

        <div id="sequencer-section">
            <div id="sequencer">
                <!-- Rows will be generated by JS -->
            </div>

            <div id="controls" style="display: flex; flex-direction: column; gap: 0.8rem; align-items: flex-start;">
                <!-- Transport & BPM Row -->
                <div style="display: flex; gap: 2rem; align-items: center;">
                    <button id="play-btn" class="control-btn">▶ PLAY</button>
                    <button id="clear-btn" class="control-btn">⟲ CLEAR</button>
                    
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <button id="bpm-minus" class="control-btn">−</button>
                        <div id="bpm-display" style="margin: 0;">BPM: <input id="bpm-val" type="text" value="120" style="background: none; border: none; color: inherit; font-family: inherit; font-size: inherit; width: 30px; outline: none; text-align: left;" /></div>
                        <button id="bpm-plus" class="control-btn">+</button>
                    </div>
                </div>
                
                <!-- Share & Persistence Row -->
                <div style="display: flex; gap: 1.5rem; align-items: center; min-height: 24px;">
                    <button id="copy-btn" class="control-btn" style="width: 70px; text-align: left;">COPY</button>
                    <button id="share-btn" class="control-btn" style="width: 110px; text-align: left;">SHARE</button>
                    <button id="paste-btn" class="control-btn" style="width: 70px; text-align: left;">PASTE</button>
                </div>
                
                <!-- Row 3: Paste Input Panel -->
                <div id="paste-container" style="display: none; align-items: center; gap: 0.5rem; margin-top: 0.2rem;">
                     <input id="paste-input" type="text" placeholder="Paste song..." style="background: #111; border: 1px solid #333; color: #fff; font-family: inherit; font-size: 0.8rem; padding: 0.2rem 0.5rem; width: 220px; text-transform: none;" />
                     <button id="load-btn" class="control-btn">LOAD</button>
                </div>
            </div>
            <div style="font-size: 0.8rem; color: #888; margin-top: 1.5rem; letter-spacing: 0.05rem; font-family: 'Rubik', sans-serif;">Use 0-9, -, = keys to play.</div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="particle-canvas"></canvas>
    </div>

    <script type="module" src="./drum.ts"></script>
</body>
</html>
