<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOUND</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    :root {
      color-scheme: dark;
      --bg: #030303;
      --fg: #f0f0f0;
      --muted: #606060;
      --accent: #ffffff;
      --area-width: min(900px, 90vw);
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Times New Roman', Times, Georgia, serif;
      overflow-x: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .page {
      width: var(--area-width);
      max-width: 100%;
    }
    .note-body {
      position: relative;
      width: 100%;
      min-height: 300px;
    }
    .line-row {
      position: absolute;
      left: 0;
      display: flex;
      align-items: baseline;
      flex-wrap: nowrap;
      gap: 0;
      width: 100%;
    }
    .line-row--justified {
      justify-content: space-between;
    }
    .frag {
      display: inline-block;
      white-space: pre;
      font: 400 22px/1.7 'Times New Roman', Times, Georgia, serif;
      color: var(--fg);
      vertical-align: baseline;
      transition: color 0.2s; /* smooth transform is handled in JS */
    }
    .frag--interactive {
      color: #9cdcfe;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-color: rgba(156, 220, 254, 0.3);
    }
    .frag--interactive:hover {
      color: #ffffff;
      text-decoration-color: #ffffff;
    }
    .frag--svg {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      transform: translateY(-2px);
      cursor: pointer;
      padding: 2px 4px;
      margin: -2px 0;
      border-radius: 4px;
    }
    .frag--svg:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .frag--svg svg {
      stroke: var(--fg);
      fill: none;
    }
    .header {
      margin-bottom: 60px;
      text-align: center;
    }
    .header h1 {
      font-size: 48px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>SOUND</h1>
    </header>
    <div class="note-body" id="note-body"></div>
  </main>
  <script type="module" src="./index.ts"></script>
</body>
</html>
