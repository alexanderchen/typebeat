<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPEBEAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            max-width: 1400px;
            width: 95vw;
            margin: 0 auto !important; /* Centered! */
        }
        @media (min-width: 1000px) {
            #app {
                flex-direction: row;
                align-items: start;
                justify-content: center;
                gap: 6rem;
                padding: 2rem;
            }
        }
        header {
            text-align: center;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            line-height: 1;
        }
        .subtitle {
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }
        #pads {
            display: grid;
            grid-template-columns: repeat(4, 180px);
            grid-template-rows: repeat(3, 180px);
            gap: 10px;
            width: 750px; /* 4 * 180 + 3 * 10px gaps */
            height: 560px; /* 3 * 180 + 2 * 10px gaps */
            margin: 0 auto;
        }
        .pad {
            position: relative;
            cursor: pointer;
            height: 180px;
        }
        .pad-text {
            position: absolute;
            font-size: 11px;
            font-family: 'Rubik', sans-serif;
            text-align: left;
            word-break: break-all;
            width: 180px;
            height: 180px;
            opacity: 0.8;
            pointer-events: none;
            box-sizing: border-box;
            padding: 2px;
            text-transform: uppercase;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .pad-text span {
            display: inline-block;
            width: 12px;
            height: 12px;
            text-align: center;
            line-height: 12px;
            pointer-events: auto;
        }
        .pad-text span:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 1px;
        }
        #sequencer {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .seq-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: pre;
            justify-content: center;
        }
        .label {
            width: 100px;
            font-size: 1rem;
            opacity: 1.0;
            text-transform: uppercase;
            font-family: 'Rubik', sans-serif;
        }
        .steps {
            display: flex;
            gap: 0.2rem;
            letter-spacing: 0.1em;
        }
        .step {
            cursor: pointer;
            transition: opacity 0.1s;
        }
        .step.active:hover, .step.inactive:hover {
            background-color: var(--row-bg-color, rgba(255, 255, 255, 0.25)) !important;
            color: var(--row-color, #fff) !important;
            opacity: 1 !important;
        }
        .step.active {
            color: #fff;
        }
        .step.inactive {
            color: rgba(255, 255, 255, 0.3);
        }
        .step.bar-start {
            color: rgba(255, 255, 255, 0.6);
        }
        .separator {
            color: rgba(255, 255, 255, 0.2);
            margin: 0 0.2rem;
        }
        #controls {
            display: flex;
            gap: 2rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-top: 2rem;
        }
        .control-btn {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: inherit;
            text-transform: inherit;
            letter-spacing: inherit;
        }
        .control-btn:hover {
            opacity: 1;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        @media (max-width: 999px) {
            body {
                justify-content: flex-start !important;
                padding-top: 0 !important;
            }
            #pads-wrapper {
                width: 100vw !important;
                overflow: hidden !important;
                position: relative !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            #app {
                padding: 0 !important;
                margin: 0 !important;
                width: 100vw !important;
                overflow-x: hidden !important;
                height: 100vh !important;
                display: flex !important;
                flex-direction: column !important;
            }
            #sequencer-section {
                display: flex !important;
                flex-direction: column !important;
                flex-grow: 1 !important;
                height: calc(100vh - (560px * (100vw / 750))) !important;
                width: 100% !important;
            }
            #sequencer {
                flex-grow: 1 !important;
                overflow-y: auto !important;
                overflow-x: hidden !important;
            }
            #controls {
                background-color: #000 !important;
                padding: 1rem !important;
                margin: 0 !important;
                border-top: 1px solid #444 !important;
                width: 100vw !important;
                box-sizing: border-box !important;
            }
        }
    </style>
</head>
<body>
    <div id="app">


        <div id="pads-wrapper">
            <div id="pads">
                <!-- Pads will be generated by JS -->
            </div>
        </div>

        <div id="sequencer-section">
            <div id="sequencer">
                <!-- Rows will be generated by JS -->
            </div>

            <div id="controls" style="display: flex; flex-direction: column; gap: 0.8rem; align-items: flex-start;">
                <!-- Transport & BPM Row -->
                <div style="display: flex; gap: 2rem; align-items: center;">
                    <button id="play-btn" class="control-btn">▶ PLAY</button>
                    <button id="clear-btn" class="control-btn" style="display: flex; align-items: center; gap: 0.3rem;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-ccw"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> CLEAR</button>
                    
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <button id="bpm-minus" class="control-btn">−</button>
                        <div id="bpm-display" style="margin: 0;">BPM: <input id="bpm-val" type="text" value="120" style="background: none; border: none; color: inherit; font-family: inherit; font-size: inherit; width: 30px; outline: none; text-align: left;" /></div>
                        <button id="bpm-plus" class="control-btn">+</button>
                    </div>
                    <button id="help-btn" class="control-btn" style="display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; padding: 0;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-help-circle"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></button>
                </div>
                
                <!-- Share & Persistence Row -->
                <div style="display: flex; gap: 1.5rem; align-items: center; min-height: 24px;">
                    <button id="copy-btn" class="control-btn">COPY</button>
                    <button id="paste-btn" class="control-btn">LOAD</button>
                    <button id="share-btn" class="control-btn">SHARE</button>
                </div>
                
                <!-- Absolute Wrapper for Context Panels -->
                <div style="position: relative; width: 100%;">
                    <!-- Row 3: Paste Input Panel -->
                    <div id="paste-container" style="display: none; align-items: center; gap: 0.5rem; margin-top: 0.2rem; position: absolute; top: 0; left: 0; background: #000; padding-bottom: 0.5rem; z-index: 10;">
                         <input id="paste-input" type="text" placeholder="Paste song..." style="background: none; border: none; border-bottom: 1px solid #555; color: #fff; font-family: inherit; font-size: 0.8rem; padding: 0.2rem 0; width: 220px; text-transform: none; outline: none;" />
                         <button id="load-btn" class="control-btn" style="display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; padding: 0;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check"><path d="M20 6 9 17l-5-5"/></svg></button>
                         <button id="cancel-paste-btn" class="control-btn" style="display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; padding: 0;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg></button>
                    </div>

                    <!-- Row 4: Help Content -->
                    <div id="help-container" style="display: none; font-size: 0.75rem; color: #888; margin-top: 0.2rem; max-width: 420px; line-height: 1.4; font-family: 'Rubik', sans-serif; text-transform: none; position: absolute; top: 0; left: 0; background: #000; padding-bottom: 0.5rem; z-index: 10; letter-spacing: normal;">
                         Built with Gemini using <a href="https://tonejs.github.io/" target="_blank" style="color: #bbb; text-decoration: underline;">Tone.js</a> + <a href="https://github.com/chenglou/pretext" target="_blank" style="color: #bbb; text-decoration: underline;">Pretext</a> by <a href="https://x.com/alexanderchen" target="_blank" style="color: #bbb; text-decoration: underline;">@alexanderchen</a>.<br/>Press 0-9, -, = to play sounds.
                    </div>
                    
                    <!-- Row 5: Status Message -->
                    <div id="status-message" style="display: none; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: #888; margin-top: 0.2rem; font-family: 'Rubik', sans-serif; position: absolute; top: 0; left: 0; background: #000; padding-bottom: 0.5rem; z-index: 10; letter-spacing: normal; text-transform: none;">
                         <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check" style="color: #bbb;"><path d="M20 6 9 17l-5-5"/></svg>
                         <span id="status-text">Song copied to clipboard.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="particle-canvas"></canvas>
    </div>

    <script type="module" src="./drum.ts"></script>
</body>
</html>
